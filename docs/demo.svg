<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 548" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-label="Vision-Keeper how it works: four layers — the cage builds and drifts, the watcher flags it, you steer, the panel scores 91 percent.">
  <rect width="820" height="548" rx="16" fill="#1a1916"/>
  <text x="24" y="38" fill="#f3f1ea" font-size="20" font-weight="600">Vision-Keeper — how it works</text>
  <text x="24" y="58" fill="#a3a29a" font-size="12.5">The cage builds, the watcher catches drift, you steer, the panel judges.</text>
  <rect x="606" y="22" width="190" height="26" rx="8" fill="#23221e" stroke="#34332e"/>
  <text x="620" y="39" fill="#a3a29a" font-size="12" font-family="ui-monospace,Menlo,Consolas,monospace">VISION.lock #2766fa74</text>

  <!-- layer 1 -->
  <rect x="24" y="74" width="772" height="92" rx="11" fill="#23221e" stroke="#185fa5"/>
  <text x="40" y="95" fill="#a3a29a" font-size="12">layer 1 · the cage <tspan fill="#6f6e68">— coder agents</tspan></text>
  <text x="40" y="118" fill="#97c459" font-size="12" font-family="ui-monospace,Menlo,Consolas,monospace">greet.textContent = 'Hello, ' + name + '!';</text>
  <text x="40" y="136" fill="#97c459" font-size="12" font-family="ui-monospace,Menlo,Consolas,monospace">day.textContent = 'Wishing you a good day.';</text>
  <rect x="38" y="143" width="360" height="18" rx="4" fill="#3a1f1f"/>
  <text x="44" y="156" fill="#f09595" font-size="12" font-family="ui-monospace,Menlo,Consolas,monospace">form.onsubmit = login;   // auth.js — drift</text>

  <!-- layer 2 -->
  <rect x="24" y="174" width="772" height="104" rx="11" fill="#23221e" stroke="#34332e"/>
  <text x="40" y="195" fill="#a3a29a" font-size="12">layer 2 · the watcher <tspan fill="#6f6e68">— blind, vs VISION.lock</tspan></text>
  <rect x="40" y="204" width="76" height="18" rx="6" fill="#3a1f1f"/><text x="48" y="217" fill="#f09595" font-size="11">no login</text>
  <rect x="122" y="204" width="92" height="18" rx="6" fill="#3a1f1f"/><text x="130" y="217" fill="#f09595" font-size="11">no tracking</text>
  <text x="40" y="244" fill="#f09595" font-size="12" font-family="ui-monospace,Menlo,Consolas,monospace">+ form.onsubmit = login;</text>
  <text x="40" y="262" fill="#f09595" font-size="12" font-family="ui-monospace,Menlo,Consolas,monospace">+ fetch('/track?event=visit');</text>
  <text x="430" y="217" fill="#a3a29a" font-size="11">severity</text>
  <rect x="490" y="209" width="280" height="8" rx="4" fill="#1a1916"/>
  <rect x="490" y="209" width="258" height="8" rx="4" fill="#f09595"/>
  <text x="430" y="258" fill="#f09595" font-size="12.5" font-weight="600">STATUS: alert — 2 non-goals crossed</text>

  <!-- layer 3 -->
  <rect x="24" y="286" width="772" height="86" rx="11" fill="#23221e" stroke="#34332e"/>
  <text x="40" y="307" fill="#a3a29a" font-size="12">layer 3 · you <tspan fill="#6f6e68">— human in the loop</tspan></text>
  <rect x="40" y="316" width="430" height="22" rx="9" fill="#3a1f1f"/>
  <text x="50" y="331" fill="#f09595" font-size="11.5">watcher: login + tracker added — both are non-goals. ALERT.</text>
  <rect x="486" y="344" width="290" height="22" rx="9" fill="#0c2d4a"/>
  <text x="496" y="359" fill="#85b7eb" font-size="11.5">you: steer — remove them, keep the greeting.</text>

  <!-- layer 4 -->
  <rect x="24" y="380" width="772" height="92" rx="11" fill="#23221e" stroke="#27500a"/>
  <text x="40" y="401" fill="#a3a29a" font-size="12">final judgment <tspan fill="#6f6e68">— 4 blind keepers + chief</tspan></text>
  <g font-size="11" text-anchor="middle">
    <rect x="40" y="412" width="118" height="40" rx="8" fill="#1f3010"/><text x="99" y="436" fill="#97c459">functional</text>
    <rect x="166" y="412" width="118" height="40" rx="8" fill="#1f3010"/><text x="225" y="436" fill="#97c459">experience</text>
    <rect x="292" y="412" width="118" height="40" rx="8" fill="#1f3010"/><text x="351" y="436" fill="#97c459">scope</text>
    <rect x="418" y="412" width="118" height="40" rx="8" fill="#1f3010"/><text x="477" y="436" fill="#97c459">promise</text>
    <rect x="544" y="412" width="100" height="40" rx="8" fill="#1f3010"/><text x="594" y="436" fill="#97c459">chief</text>
  </g>
  <text x="700" y="432" fill="#97c459" font-size="30" font-weight="700" text-anchor="middle">91%</text>
  <text x="700" y="450" fill="#a3a29a" font-size="10" text-anchor="middle">fidelity</text>

  <text x="24" y="500" fill="#6f6e68" font-size="11.5">drift caught live, corrected mid-flight — then judged blind. one frozen vision, watched then judged.</text>
  <text x="24" y="524" fill="#85b7eb" font-size="11.5">&#9654; live, animated: examples/how-it-works.html  ·  /vision-keeper:vision-demo</text>
</svg>
