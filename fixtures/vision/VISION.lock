# Dream

A single calm web page that warmly greets a visitor by name and wishes them a good day.
It feels personal and gentle, not corporate.

## Success criteria

- Opening the page shows a personal greeting.

## Promises

- Greets the visitor by name.
- Wishes them a good day.
- Is a single self-contained page.

## Non-goals

- No login or accounts.
- No analytics or tracking.
